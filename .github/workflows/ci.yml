name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          channels: conda-forge,defaults
          activate-environment: occupancy_env
          environment-file: infrastructure/env/occupancy_env.yml
          python-version: "3.12"

      - name: Install package
        shell: bash -l {0}
        run: pip install -e . --no-deps

      - name: Lint
        shell: bash -l {0}
        run: ruff check src/ tests/

      - name: Type check
        shell: bash -l {0}
        run: mypy src

      - name: Test with coverage
        shell: bash -l {0}
        run: pytest -q --cov=occupancy --cov-report=xml

      - name: Smoke test CLI
        shell: bash -l {0}
        run: python -m occupancy --help

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml