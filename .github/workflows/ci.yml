name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          channels: conda-forge,defaults
          activate-environment: occupancy_env
          environment-file: infrastructure/env/occupancy_env.yml
          python-version: 3.14

      - name: Lint
        shell: bash -l {0}
        run: ruff check src/ tests/

      - name: Type check
        shell: bash -l {0}
        run: mypy src

      - name: Test
        shell: bash -l {0}
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: pytest -q