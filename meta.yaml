{% set version = environ.get("GIT_DESCRIBE_TAG", "1.1.0").lstrip("v") %}
package:
  name: occupancy
  version: {{ version }}

source:
  path: .

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools >=68
    - setuptools-scm >=8
  run:
    - python >=3.12
    - numpy >=1.26,<3
    - pandas >=2.0,<3

test:
  imports:
    - occupancy
  commands:
    - python -m occupancy --help

about:
  summary: Stochastic occupancy and electricity profile modeling toolkit.
  home: https://github.com/UU-BUEM/occupancy
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - SomadSahoo
