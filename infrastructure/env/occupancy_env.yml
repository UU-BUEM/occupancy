# infrastructure/env/occupancy_env.yml
# Runtime + test environment for occupancy module.
#
# Create:
#   conda env create -f infrastructure/env/occupancy_env.yml
#   conda activate occupancy_env
#   pip install -e . --no-deps        # install occupancy from repo root
#
# Update:
#   conda env update -n occupancy_env \
#     -f infrastructure/env/occupancy_env.yml --prune
#   pip install -e . --no-deps        # re-run if pyproject.toml changed
#
name: occupancy_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - numpy=1.26.*
  - pandas=2.2.*
  - pytest=8.*
  - pytest-cov=5.*
  - pip
  - pip:
    - ruff>=0.6               # linter (dev tool)
    - mypy>=1.8               # type checker
